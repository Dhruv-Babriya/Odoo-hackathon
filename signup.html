<!DOCTYPE html>
<html>

<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<input type="text"
id="name"
placeholder="Full Name">

<input type="email"
id="email"
placeholder="Email">

<input type="password"
id="password"
placeholder="Password">

<select id="role">

<option value="employee">
Employee
</option>

<option value="manager">
Manager
</option>

<option value="admin">
Admin
</option>

</select>

<button onclick="signup()">
Register
</button>

<a href="index.html">
Back To Login
</a>

</div>

<script src="script.js"></script>

</body>
</html>
