<!DOCTYPE html>
<html>
<head>
    <title>Vendor Quotation Submission Form</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#F2E1C3;
            margin:0;
            padding:20px;
            min-height:100vh;
        }

        body::before{
            content:"";
            position:fixed;
            inset:0;
            background:
              radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.10), transparent 40%),
              radial-gradient(circle at 90% 30%, rgba(16, 185, 129, 0.10), transparent 45%);
            pointer-events:none;
            z-index:-1;
        }

        .container{
            width: 560px;
            max-width: 96vw;
            margin: 40px auto;
            background: white;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 6px 22px rgba(0,0,0,0.10);
        }

        h2{
            text-align:center;
            color:#1f2937;
            margin-bottom: 18px;
            font-weight: 900;
            font-size: 22px;
        }

        label{
            font-weight: 900;
            display:block;
            margin-top: 12px;
            color:#374151;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        textarea{
            width: 100%;
            padding: 11px 12px;
            margin-top: 6px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus, textarea:focus{
            border-color:#93c5fd;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        textarea{ resize: vertical; }

        input[type="submit"]{
            width:100%;
            background-color:#22c55e;
            color:white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            margin-top: 18px;
            cursor:pointer;
            font-size: 16px;
            font-weight: 900;
            transition: 0.2s;
        }

        input[type="submit"]:hover{ background-color:#16a34a; }

        .hint{
            margin-top: 12px;
            font-size: 13px;
            color:#6b7280;
            text-align:center;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Vendor Quotation Submission</h2>
    <p class="hint">Complete the RFQ quotation details and submit to continue.</p>

    <form onsubmit="return submitQuotation(event)" action="#" method="post">

        <label for="rfq">RFQ ID</label>
        <input type="text" id="rfq" name="rfq" placeholder="Enter RFQ ID" required>

        <label for="price">Pricing Details (₹)</label>
        <input type="number" id="price" name="price" placeholder="Enter Price" required>

        <label for="delivery">Delivery Timeline (Days)</label>
        <input type="number" id="delivery" name="delivery" placeholder="Enter Delivery Days" required>

        <label for="notes">Notes / Comments</label>
        <textarea id="notes" name="notes" rows="4" placeholder="Enter notes or comments"></textarea>

        <label for="quotation">Editable Quotation</label>
        <textarea id="quotation" name="quotation" rows="6" placeholder="Enter quotation details here"></textarea>

        <input type="submit" value="Submit Quotation">

    </form>

</div>

<script>
function submitQuotation(e){
    e.preventDefault();

    // Enforce that RFQ was created first.
    if(!requireStep('VENDOR_QUOTATION', 'flow.selectedRFQ')){
        return false;
    }

    const rfqId = document.getElementById('rfq').value.trim();
    const price = parseFloat(document.getElementById('price').value);
    const delivery = parseInt(document.getElementById('delivery').value);
    const notes = document.getElementById('notes').value.trim();
    const quotationText = document.getElementById('quotation').value.trim();

    if(!rfqId || isNaN(price) || isNaN(delivery)){
        alert('Fill RFQ ID, Price and Delivery Days');
        return false;
    }

    const quotationObj = {
        rfqId,
        vendor: 'Vendor (Demo)',
        quotationNo: 'QT-' + Math.floor(100 + Math.random()*900),
        price,
        deliveryDays: delivery,
        notes,
        quotationText,
        submittedAt: new Date().toISOString()
    };

    setFlowState('flow.selectedQuotation', quotationObj);

    requireStep('QUOTATION_COMPARISON', 'flow.selectedQuotation');
    window.location = 'QuotationComparison.html';
    return false;
}
</script>

</body>
</html>
