<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>
<link rel="stylesheet"
href="style.css">
</head>

<body>

<div class="container">

<h2>Procurement Dashboard</h2>

<div id="roleSection"></div>

<button onclick="logout()">
Logout
</button>

</div>

<script>

let role =
localStorage.getItem("role");

if(role=="admin")
{
document.getElementById("roleSection")
.innerHTML=
"<h3>Admin Access</h3>";
}

else if(role=="manager")
{
document.getElementById("roleSection")
.innerHTML=
"<h3>Manager Access</h3>";
}

else
{
document.getElementById("roleSection")
.innerHTML=
"<h3>Employee Access</h3>";
}

function logout()
{
localStorage.clear();
window.location="index.html";
}

</script>

</body>
</html>
