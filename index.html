<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VendorBridge - Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F2E1C3;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand h2 {
      font-size: 18px;
      color: #111827;
      margin: 0;
      letter-spacing: 0.2px;
    }

    .badge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .label {
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: background 0.2s, transform 0.05s;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
    }

    .links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="brand">
      <h2>VendorBridge</h2>
      <div class="badge">ERP Login</div>
    </div>

    <div style="margin-bottom: 14px;">
      <h3 style="margin:0; font-size:20px; color:#111827;">Procurement Login</h3>
      <p style="margin:6px 0 0 0; color:#6b7280; font-size:13px;">Sign in to access vendor workflows.</p>
    </div>

    <div class="field">
      <div class="label">Email</div>
      <input type="email" id="email" placeholder="Enter Email" autocomplete="username" />
    </div>

    <div class="field">
      <div class="label">Password</div>
      <input type="password" id="password" placeholder="Enter Password" autocomplete="current-password" />
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="login()">Login</button>
    </div>

    <div class="links">
      <a href="signup.html">Create Account</a>
      <a href="forgot.html">Forgot Password?</a>
    </div>

    <div class="hint">
      Demo note: Your role is stored in localStorage from signup.
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
