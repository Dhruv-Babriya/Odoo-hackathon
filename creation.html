<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFQ Creation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#1976d2;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.card h3{
    color:#1976d2;
    margin-bottom:15px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:vertical;
}

.quantity-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.quantity-box button{
    width:40px;
    height:40px;
    border:none;
    background:#1976d2;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

.vendor-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.vendor-item{
    background:#f7f7f7;
    padding:10px;
    border-radius:5px;
}

.upload-box{
    border:2px dashed #1976d2;
    padding:25px;
    text-align:center;
    border-radius:8px;
}

.actions{
    text-align:center;
    margin-top:20px;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
    font-size:16px;
}

.btn-primary{
    background:#1976d2;
    color:white;
}

.btn-success{
    background:#4caf50;
    color:white;
}

.btn-danger{
    background:#f44336;
    color:white;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>Procurement Management System</h2>
    <div>👤 Admin</div>
</div>

<div class="container">

    <h1 style="margin-bottom:20px;">Create New RFQ</h1>

    <!-- RFQ Information -->
    <div class="card">
        <h3>RFQ Information</h3>

        <div class="form-group">
            <label>RFQ Title</label>
            <input type="text" placeholder="Enter RFQ Title">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea rows="4" placeholder="Enter RFQ Description"></textarea>
        </div>
    </div>

    <!-- Product Details -->
    <div class="card">
        <h3>Product / Service Details</h3>

        <div class="form-group">
            <label>Product / Service Name</label>
            <input type="text" placeholder="Product Name">
        </div>

        <div class="form-group">
            <label>Category</label>
            <select>
                <option>Select Category</option>
                <option>Electronics</option>
                <option>Furniture</option>
                <option>IT Services</option>
                <option>Office Supplies</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantity</label>

            <div class="quantity-box">
                <button onclick="decreaseQty()">-</button>
                <input type="number" id="qty" value="1">
                <button onclick="increaseQty()">+</button>
            </div>
        </div>

        <div class="form-group">
            <label>Unit</label>
            <select>
                <option>Pieces</option>
                <option>Kg</option>
                <option>Liters</option>
                <option>Boxes</option>
            </select>
        </div>
    </div>

    <!-- Vendor Assignment -->
    <div class="card">
        <h3>Vendor Assignment</h3>

        <div class="form-group">
            <label>Search Vendor</label>
            <input type="text" placeholder="Search Vendor">
        </div>

        <div class="vendor-list">
            <div class="vendor-item">
                <input type="checkbox"> Vendor A
            </div>

            <div class="vendor-item">
                <input type="checkbox"> Vendor B
            </div>

            <div class="vendor-item">
                <input type="checkbox"> Vendor C
            </div>

            <div class="vendor-item">
                <input type="checkbox"> Vendor D
            </div>
        </div>
    </div>

    <!-- Attachment -->
    <div class="card">
        <h3>Attachments</h3>

        <div class="upload-box">
            <p>Drag & Drop Files Here</p>
            <br>
            <input type="file" multiple>
        </div>
    </div>

    <!-- Deadline -->
    <div class="card">
        <h3>Deadline Selection</h3>

        <div class="form-group">
            <label>Closing Date</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Closing Time</label>
            <input type="time">
        </div>
    </div>

    <!-- Buttons -->
    <div class="actions">
        <button class="btn btn-primary">Save Draft</button>
        <button class="btn btn-success">Submit RFQ</button>
        <button class="btn btn-danger">Cancel</button>
    </div>

</div>

<script>
function increaseQty() {
    let qty = document.getElementById("qty");
    qty.value = parseInt(qty.value) + 1;
}

function decreaseQty() {
    let qty = document.getElementById("qty");

    if(parseInt(qty.value) > 1){
        qty.value = parseInt(qty.value) - 1;
    }
}
</script>

</body>
</html>
